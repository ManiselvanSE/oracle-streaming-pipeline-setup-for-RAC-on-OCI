# Control Center config for Oracle XStream CDC POC (single broker, KRaft)
# Use with: control-center-start config/control-center.properties
# Requires: Kafka (9092), Schema Registry (8081) running

bootstrap.servers=localhost:9092
confluent.controlcenter.data.dir=/home/opc/oracle-xstream-cdc-poc/data/control-center
confluent.controlcenter.connect.connect-default.cluster=http://localhost:8083
confluent.controlcenter.schema.registry.url=http://localhost:8081
confluent.controlcenter.internal.topics.replication=1
confluent.controlcenter.command.topic.replication=1
confluent.metrics.topic.replication=1
confluent.monitoring.interceptor.topic.replication=1
