# Monitoring stack: JMX exporters, Prometheus, Grafana, Kafka Exporter
# Run with: docker compose -f docker/docker-compose.yml -f docker/docker-compose.monitoring.yml up -d
# Ports: Prometheus 9090, Grafana 3000, Kafka Exporter 9308

services:
  kafka1:
    build:
      context: .
      dockerfile: Dockerfile.kafka-jmx
    image: kafka-jmx:7.9.0
    ports:
      - "9092:9092"
      - "9990:9990"
    environment:
      KAFKA_OPTS: "-javaagent:/opt/jmx-exporter/jmx_prometheus_javaagent.jar=9990:/opt/jmx-exporter/kafka-broker.yml"
    volumes:
      - ../monitoring/jmx/kafka-broker.yml:/opt/jmx-exporter/kafka-broker.yml:ro

  kafka2:
    build:
      context: .
      dockerfile: Dockerfile.kafka-jmx
    image: kafka-jmx:7.9.0
    ports:
      - "9094:9094"
      - "9991:9990"
    environment:
      KAFKA_OPTS: "-javaagent:/opt/jmx-exporter/jmx_prometheus_javaagent.jar=9990:/opt/jmx-exporter/kafka-broker.yml"
    volumes:
      - ../monitoring/jmx/kafka-broker.yml:/opt/jmx-exporter/kafka-broker.yml:ro

  kafka3:
    build:
      context: .
      dockerfile: Dockerfile.kafka-jmx
    image: kafka-jmx:7.9.0
    ports:
      - "9095:9095"
      - "9992:9990"
    environment:
      KAFKA_OPTS: "-javaagent:/opt/jmx-exporter/jmx_prometheus_javaagent.jar=9990:/opt/jmx-exporter/kafka-broker.yml"
    volumes:
      - ../monitoring/jmx/kafka-broker.yml:/opt/jmx-exporter/kafka-broker.yml:ro

  schema-registry:
    build:
      context: .
      dockerfile: Dockerfile.schema-registry-jmx
    image: schema-registry-jmx:7.9.0
    environment:
      SCHEMA_REGISTRY_OPTS: "-javaagent:/opt/jmx-exporter/jmx_prometheus_javaagent.jar=9992:/opt/jmx-exporter/schema-registry.yml"
    ports:
      - "8081:8081"
      - "9993:9992"
    volumes:
      - ../monitoring/jmx/schema-registry.yml:/opt/jmx-exporter/schema-registry.yml:ro

  connect:
    environment:
      # JMX Exporter + throughput-optimized JVM (G1GC, heap, dedup)
      KAFKA_OPTS: >-
        -javaagent:/opt/jmx-exporter/jmx_prometheus_javaagent.jar=9991:/opt/jmx-exporter/kafka-connect.yml
        -Dcom.sun.management.jmxremote=true
        -Dcom.sun.management.jmxremote.authenticate=false
        -Dcom.sun.management.jmxremote.ssl=false
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:InitiatingHeapOccupancyPercent=45
        -XX:G1HeapRegionSize=16m
        -Xms4g -Xmx4g
        -XX:+UseStringDeduplication
        -XX:-UseBiasedLocking
    ports:
      - "8083:8083"
      - "9994:9991"
    volumes:
      - ../monitoring/jmx/kafka-connect.yml:/opt/jmx-exporter/kafka-connect.yml:ro
    deploy:
      resources:
        limits:
          memory: 6G

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    command:
      - --kafka.server=kafka1:29092
      - --kafka.server=kafka2:29092
      - --kafka.server=kafka3:29092
      - --web.listen-address=:9308
      - --log.level=info
    ports:
      - "9308:9308"
    depends_on:
      - kafka1
      - kafka2
      - kafka3
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.enable-admin-api
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    depends_on:
      - kafka1
      - connect
      - schema-registry
      - kafka-exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: 3000
      GF_INSTALL_PLUGINS: ""
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
