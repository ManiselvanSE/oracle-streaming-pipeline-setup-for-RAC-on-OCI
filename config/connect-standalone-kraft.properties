# Kafka Connect standalone worker - Oracle XStream CDC POC
# No consumer group = no "ensuring membership" delays. Connector starts with process.
# Use with: connect-standalone config/connect-standalone-kraft.properties xstream-connector/oracle-xstream-rac-connector.properties

bootstrap.servers=localhost:9092

# Converters - JSON without schemas (matches connector)
key.converter=org.apache.kafka.connect.json.JsonConverter
value.converter=org.apache.kafka.connect.json.JsonConverter
key.converter.schemas.enable=false
value.converter.schemas.enable=false

# Standalone: file-based offset storage (persistent path, survives reboot)
offset.storage.file.filename=/home/opc/oracle-xstream-cdc-poc/data/connect-standalone.offsets
offset.flush.interval.ms=10000

# REST API port (default 8083)
rest.port=8083

# Plugin path - Confluent Hub components (Oracle XStream connector)
plugin.path=/opt/confluent/confluent/share/confluent-hub-components
