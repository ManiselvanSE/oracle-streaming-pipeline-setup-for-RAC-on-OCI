# Kafka server.properties for KRaft mode (Confluent Platform 7.9)
# No Zookeeper required

process.roles=broker,controller
node.id=1

# Controller quorum - single node
controller.quorum.voters=1@localhost:9093

# Listeners
listeners=PLAINTEXT://:9092,CONTROLLER://:9093
listener.security.protocol.map=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
controller.listener.names=CONTROLLER

# Log directories (must match path used in format)
log.dirs=/tmp/kraft-combined-logs

# Advertised (for external clients, use actual hostname if needed)
advertised.listeners=PLAINTEXT://localhost:9092

# Num partitions for auto-created topics
num.partitions=1
