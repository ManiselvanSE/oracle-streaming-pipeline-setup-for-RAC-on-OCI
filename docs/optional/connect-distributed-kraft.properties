# Kafka Connect distributed worker - Oracle XStream CDC POC (OPTIONAL)
# The demo uses STANDALONE mode. Use this config only if you need distributed Connect.
# Use from project root: connect-distributed -daemon docs/optional/connect-distributed-kraft.properties
# Extends Confluent defaults with longer timeouts for slow cluster join.

# Bootstrap (must match Kafka broker)
bootstrap.servers=localhost:9092
group.id=connect-cluster

# Converters - JSON without schemas (matches connector config)
key.converter=org.apache.kafka.connect.json.JsonConverter
value.converter=org.apache.kafka.connect.json.JsonConverter
key.converter.schemas.enable=false
value.converter.schemas.enable=false

# Internal topics
offset.storage.topic=connect-offsets
offset.storage.replication.factor=1
config.storage.topic=connect-configs
config.storage.replication.factor=1
status.storage.topic=connect-status
status.storage.replication.factor=1

# Timeouts - give Connect more time to join cluster (avoids "ensuring membership" 500)
rebalance.timeout.ms=180000
session.timeout.ms=30000
rest.request.timeout.ms=300000

# Plugin path - Confluent Hub components (Oracle XStream connector)
plugin.path=/opt/confluent/confluent/share/confluent-hub-components
offset.flush.interval.ms=10000
